<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .game-wrapper {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .game-container:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
        }

        .title-section {
            margin-bottom: 30px;
        }

        .title-section h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            font-weight: 300;
            letter-spacing: 1px;
        }

        canvas {
            display: block;
            border: 4px solid #667eea;
            background-color: #0a0e27;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3),
                        inset 0 0 20px rgba(0, 0, 0, 0.5);
            margin: 20px auto;
            transition: box-shadow 0.3s ease;
        }

        canvas:hover {
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5),
                        inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            margin-top: 30px;
        }

        .score-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }

        .score-label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score {
            color: #4ade80;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .controls {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .controls h3 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .control-item {
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .control-item:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .control-item p {
            font-size: 13px;
            margin: 0;
        }

        .control-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-item .key {
            color: #4ade80;
            font-weight: 600;
            background: rgba(74, 222, 128, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
            font-size: 12px;
        }

        .game-actions {
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .game-actions p {
            font-size: 13px;
            margin: 0;
            color: #aaa;
        }

        .game-actions .key {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 4px 8px;
            border-radius: 5px;
            display: inline-block;
            margin: 0 3px;
            font-weight: 600;
            font-size: 12px;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 25px;
            }

            .title-section h1 {
                font-size: 36px;
            }

            canvas {
                width: 100% !important;
                height: auto !important;
            }

            .control-group {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .score {
                font-size: 36px;
            }
        }

        /* Animation for score updates */
        @keyframes scoreUpdate {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
                color: #60a5fa;
            }
            100% {
                transform: scale(1);
                color: #4ade80;
            }
        }

        .score.updated {
            animation: scoreUpdate 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="title-section">
                <h1>🏓 PING PONG</h1>
                <p class="subtitle">Classic Arcade Game</p>
            </div>

            <canvas id="gameCanvas" width="800" height="400"></canvas>

            <div class="info">
                <div class="score-section">
                    <div class="score-label">Score</div>
                    <div class="score">
                        <span id="player1Score">0</span> : <span id="player2Score">0</span>
                    </div>
                </div>

                <div class="controls">
                    <h3>Controls</h3>
                    <div class="control-group">
                        <div class="control-item">
                            <strong>Player 1 (Left)</strong>
                            <p>Move Up: <span class="key">↑</span></p>
                            <p>Move Down: <span class="key">↓</span></p>
                        </div>
                        <div class="control-item">
                            <strong>Player 2 (Right)</strong>
                            <p>Move Up: <span class="key">↑</span></p>
                            <p>Move Down: <span class="key">↓</span></p>
                        </div>
                    </div>
                </div>

                <div class="game-actions">
                    <p>
                        <span class="key">SPACE</span> to Start/Pause &nbsp;&nbsp;|&nbsp;&nbsp;
                        <span class="key">R</span> to Reset
                    </p>
                    <p class="footer-text">Use arrow keys to control both paddles</p>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
